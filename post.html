<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2V4D6ZQV6Q"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-2V4D6ZQV6Q');
  </script>

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7072826210873110"
       crossorigin="anonymous"></script>

  <title>Blog Post — Eat With Sam K</title>
  <link rel="icon" type="image/png" href="images/favicon.png?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=3" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="index.html"><img class="logo-img" src="images/logo.png?v=2" alt="Eat With Sam K logo" /> Eat With Sam K</a>
      <nav class="main-nav">
        <a href="index.html">The Map</a>
        <a href="index.html#places">Reviews</a>
        <a href="blog.html" class="active">Blog</a>
      </nav>
      <div class="social-row" data-socials></div>
    </div>
  </header>

  <main class="post-wrap" id="post"></main>

  <footer class="site-footer">
    <div class="footer-inner">
      <a class="logo" href="index.html"><img class="logo-img" src="images/logo.png?v=2" alt="Eat With Sam K logo" /> Eat With Sam K</a>
      <div class="social-row" data-socials></div>
      <p class="footer-note">© <span id="year"></span> Eat With Sam K · All reviews are my own — I pay for every meal.</p>
    </div>
  </footer>

  <script src="js/data.js?v=2"></script>
  <script src="js/blog-data.js?v=2"></script>
  <script src="js/common.js?v=2"></script>
  <script>
    function setMeta(name, content, attr) {
      attr = attr || "name";
      let tag = document.head.querySelector(`meta[${attr}="${name}"]`);
      if (!tag) {
        tag = document.createElement("meta");
        tag.setAttribute(attr, name);
        document.head.appendChild(tag);
      }
      tag.setAttribute("content", content);
    }

    const id = new URLSearchParams(location.search).get("id");
    const post = BLOG_POSTS.find((p) => p.id === id);
    const el = document.getElementById("post");

    if (!post) {
      setMeta("robots", "noindex, follow");
      el.innerHTML = `
        <a class="post-back" href="blog.html">← Back to the blog</a>
        <h1>Post not found 🤔</h1>
        <p>That post may have moved. Head back to the blog to see everything.</p>`;
    } else {
      const title = post.title + " — Eat With Sam K";
      const description = post.excerpt;
      const canonical = `https://www.eatwithsamk.com/post.html?id=${post.id}`;
      const ogImage = "https://www.eatwithsamk.com/images/logo.png";

      document.title = title;
      setMeta("description", description);
      setMeta("robots", "index, follow");

      let canon = document.head.querySelector('link[rel="canonical"]');
      if (!canon) {
        canon = document.createElement("link");
        canon.setAttribute("rel", "canonical");
        document.head.appendChild(canon);
      }
      canon.setAttribute("href", canonical);

      setMeta("og:type", "article", "property");
      setMeta("og:title", title, "property");
      setMeta("og:description", description, "property");
      setMeta("og:url", canonical, "property");
      setMeta("og:image", ogImage, "property");
      setMeta("og:site_name", "Eat With Sam K", "property");
      setMeta("twitter:card", "summary");
      setMeta("twitter:title", title);
      setMeta("twitter:description", description);
      setMeta("twitter:image", ogImage);

      const jsonLd = document.createElement("script");
      jsonLd.type = "application/ld+json";
      jsonLd.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        headline: post.title,
        datePublished: post.date,
        author: { "@type": "Person", name: "Sam K" },
        publisher: { "@type": "Organization", name: "Eat With Sam K" },
        description: post.excerpt,
        url: canonical,
      });
      document.head.appendChild(jsonLd);

      const fmt = new Date(post.date + "T12:00:00").toLocaleDateString("en-US", {
        month: "long", day: "numeric", year: "numeric",
      });
      el.innerHTML = `
        <a class="post-back" href="blog.html">← Back to the blog</a>
        <div class="post-emoji">${post.emoji}</div>
        <h1>${post.title}</h1>
        <div class="blog-meta"><span class="pill">${post.city}</span><span>${fmt}</span></div>
        <div class="post-body">${post.content}</div>`;
    }
  </script>
</body>
</html>
