  <meta name="twitter:title" content="Eat With Sam K — Every Spot I've Rated, On One Map" />

  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Eat With Sam K",
    "url": "https://www.eatwithsamk.com/index.html"
  }
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="index.html"><img class="logo-img" src="images/logo.png?v=2" alt="Eat With Sam K logo" /> Eat With Sam K</a>
      <nav class="main-nav">
        <a href="index.html" class="active">The Map</a>
        <a href="index.html#places">Reviews</a>
        <a href="blog.html">Blog</a>
      </nav>
      <div class="social-row" data-socials></div>
    </div>
  </header>

  <section class="hero">
    <img class="hero-logo" src="images/logo.png?v=2" alt="Eat With Sam K — Good Food. Real Reviews. Good Times." />
    <h1>Every bite, <span class="accent">rated</span>.<br />Every spot, on the map.</h1>
    <p data-tagline></p>
    <div class="hero-stats">
      <div class="stat"><div class="num" id="stat-places">0</div><div class="label">Places Rated</div></div>
      <div class="stat"><div class="num" id="stat-cities">0</div><div class="label">Cities</div></div>
      <div class="stat"><div class="num" id="stat-avg">0</div><div class="label">Avg Rating</div></div>
    </div>
  </section>

  <section class="map-section">
    <div class="container">
      <div id="map"></div>
    </div>
  </section>

  <section class="places-section" id="places">
    <div class="container">
      <div class="toolbar">
        <h2>All Reviews</h2>
        <input type="search" class="search-input" id="search" placeholder="Search by name, city, or food…" />
        <select class="sort-select" id="sort">
          <option value="rating-desc">Highest rated</option>
          <option value="rating-asc">Lowest rated</option>
          <option value="name">Name A–Z</option>
          <option value="city">City A–Z</option>
        </select>
      </div>
      <div class="cards-grid" id="cards"></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="footer-inner">
      <a class="logo" href="index.html"><img class="logo-img" src="images/logo.png?v=2" alt="Eat With Sam K logo" /> Eat With Sam K</a>
      <div class="social-row" data-socials></div>
      <p class="footer-note">© <span id="year"></span> Eat With Sam K · All reviews are my own — I pay for every meal.</p>
    </div>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/data.js?v=2"></script>
  <script src="js/common.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
